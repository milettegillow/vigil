<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#080010" />
    <link rel="icon" type="image/png" href="/vigil.png" />
    <link rel="apple-touch-icon" href="/vigil.png" />
    <title>Vigil</title>

    <!-- Google Fonts: Cormorant Garamond -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- ==================== STYLES ==================== -->
    <style>
      /* --- Reset & Base --- */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Cormorant Garamond", Georgia, serif;
        background-color: #080010;
        /* Layer 1: base deep sky gradient */
        background-image: radial-gradient(
          ellipse at 50% 40%,
          #0a1628 0%,
          #060012 50%,
          #080010 100%
        );
        color: #fffef0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        touch-action: none;
      }

      /* --- Location Overlay --- */
      #location-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at 50% 40%,
          #0d1b4b 0%,
          #0a0015 70%
        );
        opacity: 1;
        transition: opacity 0.8s ease;
      }

      #location-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #location-overlay p {
        font-style: italic;
        font-weight: 300;
        font-size: 1.25rem;
        text-align: center;
        max-width: 280px;
        line-height: 1.6;
        color: #fffef0;
        margin-bottom: 2.5rem;
      }

      #location-overlay button {
        background: none;
        border: none;
        color: #fffef0;
        font-family: "Cormorant Garamond", Georgia, serif;
        cursor: pointer;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      #location-overlay .allow-btn {
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 1.5rem;
        padding: 0.5rem 1rem;
        transition: opacity 0.3s;
      }

      #location-overlay .allow-btn:hover {
        opacity: 0.7;
      }

      #location-overlay .skip-btn {
        font-size: 0.75rem;
        font-weight: 300;
        opacity: 0.45;
        transition: opacity 0.3s;
      }

      #location-overlay .skip-btn:hover {
        opacity: 0.7;
      }

      /* --- Layer 2: Milky Way suggestion canvas --- */
      #milkyway-canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* --- Layer 3: Star canvas --- */
      #sky-canvas {
        position: fixed;
        inset: 0;
        z-index: 2;
      }

      /* --- Layer 3.5: Atmosphere overlays (horizon + vignette) --- */
      #atmosphere-overlay {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        /* Layer 3 horizon: warm navy at bottom 15% */
        background:
          linear-gradient(to top, rgba(13, 31, 60, 0.3) 0%, transparent 15%),
          /* Layer 4 vignette: dark corners */
          radial-gradient(
              ellipse at 50% 50%,
              transparent 40%,
              rgba(3, 0, 8, 0.4) 100%
            );
      }

      /* --- Constellation SVG Overlay --- */
      #constellation-layer {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }

      .constellation-star {
        fill: #fffef0;
      }

      .constellation-line {
        stroke: #fffef0;
        stroke-width: 0.8;
        opacity: 0.4;
      }

      .constellation-label {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 11px;
        fill: #fffef0;
        fill-opacity: 0.35;
        text-anchor: middle;
      }

      /* --- Moon Three.js canvas --- */
      #moon-container {
        position: fixed;
        z-index: 5;
        left: 50%;
        top: 40%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      #moon-three-canvas {
        display: block;
      }

      /* --- Tab Navigation — liquid glass pill --- */
      #tab-bar {
        position: fixed;
        bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        max-width: 420px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-around;
        height: 56px;
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        backdrop-filter: blur(24px) saturate(180%);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          0 1px 0 rgba(255, 255, 255, 0.05) inset;
      }

      #tab-bar::before {
        content: "";
        position: absolute;
        top: 0;
        left: 20px;
        right: 20px;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 1px;
      }

      .tab-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        cursor: pointer;
        transition:
          opacity 0.3s,
          transform 0.3s;
      }

      .tab-icon img {
        width: 24px;
        height: 24px;
        opacity: 0.35;
        transform: scale(1);
        transition:
          opacity 200ms ease,
          transform 200ms ease;
      }

      .tab-icon.active img {
        opacity: 1;
        transform: scale(1.1);
      }

      /* --- Drawer --- */
      #drawer-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: transparent;
        display: none;
      }

      #drawer-backdrop.open {
        display: block;
      }

      #info-drawer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 51;
        height: auto;
        max-height: 55vh;
        background: rgba(10, 10, 31, 0.92);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
        transition: transform 400ms cubic-bezier(0.16, 1, 0.3, 1);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      #info-drawer.open {
        transform: translateY(0);
      }

      .drawer-handle {
        width: 30px;
        height: 3px;
        background: rgba(255, 254, 240, 0.3);
        border-radius: 3px;
        margin: 12px auto 0;
      }

      .drawer-body {
        padding: 28px 32px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .drawer-phase-icon {
        width: 72px;
        height: 72px;
        margin-bottom: 16px;
      }

      .drawer-title {
        font-size: 38px;
        font-style: italic;
        font-weight: 300;
        color: #fffef0;
        margin-bottom: 8px;
      }

      .drawer-subtitle {
        font-size: 14px;
        font-weight: 300;
        color: #fffef0;
        opacity: 0.6;
        margin-bottom: 6px;
      }

      .drawer-poem {
        font-size: 17px;
        font-style: italic;
        font-weight: 300;
        color: #fffef0;
        opacity: 0.7;
        line-height: 1.6;
        max-width: 300px;
        margin-bottom: 24px;
      }

      .drawer-divider {
        width: 60px;
        height: 1px;
        background: rgba(255, 254, 240, 0.2);
        margin-bottom: 24px;
      }

      .drawer-stats {
        display: flex;
        gap: 28px;
        margin-bottom: 16px;
      }

      .drawer-stat {
        text-align: center;
      }

      .drawer-stat-value {
        font-size: 20px;
        font-weight: 400;
        color: #fffef0;
      }

      .drawer-stat-label {
        font-size: 12px;
        font-weight: 300;
        color: #fffef0;
        opacity: 0.45;
        margin-top: 2px;
      }

      .drawer-footnote {
        font-size: 11px;
        font-style: italic;
        font-weight: 300;
        color: #fffef0;
        opacity: 0.4;
        max-width: 260px;
        line-height: 1.5;
      }

      .drawer-description {
        font-size: 14px;
        font-weight: 300;
        color: #fffef0;
        opacity: 0.65;
        line-height: 1.7;
        max-width: 320px;
        margin-bottom: 24px;
      }

      /* --- Moon tap target --- */
      #moon-tap-target {
        position: fixed;
        z-index: 6;
        left: 50%;
        top: 40%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        cursor: pointer;
      }

      /* --- Constellation corner label --- */
      #constellation-corner {
        position: fixed;
        top: 0;
        left: 0;
        width: 120px;
        height: 120px;
        z-index: 7;
        cursor: pointer;
      }

      /* --- Settings tab view --- */
      #view-settings {
        flex-direction: column;
        padding: 60px 32px 100px;
        background: linear-gradient(to bottom, #080010, #0a1628);
        overflow-y: auto;
      }

      .settings-inner {
        padding: 0 32px 60px;
        max-width: 380px;
        margin: 0 auto;
      }

      .settings-header {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 16px;
        color: #fffef0;
        opacity: 0.5;
        text-align: center;
        margin-bottom: 36px;
      }

      .settings-section {
        margin-bottom: 32px;
      }

      .settings-label {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 15px;
        color: #fffef0;
        opacity: 0.4;
        margin-bottom: 14px;
        text-transform: lowercase;
      }

      .settings-sound-name {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 14px;
        color: #fffef0;
        opacity: 0.3;
        margin-top: 8px;
      }

      /* Volume slider */
      .volume-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2px;
        background: rgba(255, 254, 240, 0.2);
        border-radius: 1px;
        outline: none;
        cursor: pointer;
      }

      .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fffef0;
        border: none;
        cursor: pointer;
      }

      .volume-slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fffef0;
        border: none;
        cursor: pointer;
      }

      .volume-slider::-moz-range-progress {
        background: rgba(255, 254, 240, 0.6);
        height: 2px;
      }

      /* Location display */
      .settings-coords {
        font-size: 20px;
        color: #fffef0;
        opacity: 0.9;
        margin-bottom: 16px;
      }

      .settings-location-input-wrap {
        position: relative;
        margin-bottom: 8px;
      }

      .settings-location-input {
        width: 100%;
        background: none;
        border: none;
        border-bottom: 1px solid rgba(255, 254, 240, 0.2);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 16px;
        color: #fffef0;
        padding: 6px 30px 6px 0;
        outline: none;
        touch-action: manipulation;
      }

      .settings-location-input::placeholder {
        font-style: italic;
        color: rgba(255, 254, 240, 0.3);
      }

      .settings-submit-btn {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #fffef0;
        opacity: 0.4;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 2px;
        line-height: 1;
      }

      .settings-submit-btn:hover {
        opacity: 0.7;
      }

      .settings-location-note {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 14px;
        color: #fffef0;
        opacity: 0.3;
        margin-top: 6px;
      }

      .settings-gps-link {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 14px;
        color: #fffef0;
        opacity: 0.7;
        cursor: pointer;
        background: none;
        border: none;
        border-bottom: 1px solid rgba(255, 254, 240, 0.4);
        padding: 0 0 2px 0;
        margin-top: 14px;
        display: inline-block;
        transition: opacity 200ms ease;
      }

      .settings-gps-link:hover {
        opacity: 1;
      }

      .settings-about {
        text-align: center;
      }

      .settings-about-line1 {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 18px;
        color: #fffef0;
        opacity: 0.7;
        margin-bottom: 4px;
      }

      .settings-about-line2 {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 14px;
        color: #fffef0;
        opacity: 0.4;
      }

      .settings-confirmation {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 18px;
        color: #fffef0;
        opacity: 0;
        z-index: 100;
        pointer-events: none;
        transition: opacity 400ms ease;
      }

      .settings-confirmation.visible {
        opacity: 1;
      }

      /* --- Tab views --- */
      .view {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
        visibility: hidden;
      }

      .view.active {
        opacity: 1;
        pointer-events: auto;
        visibility: visible;
      }

      /* --- Sun tab --- */
      #view-day {
        flex-direction: column;
        padding: 60px 32px 100px;
        overflow-y: auto;
      }

      .sun-icon { margin-bottom: 12px; }

      .sun-date {
        font-style: italic;
        font-size: 13px;
        color: #fffef0;
        opacity: 0.5;
        margin-bottom: 40px;
      }

      .sun-rows {
        display: flex;
        flex-direction: column;
        gap: 32px;
        align-items: center;
        margin-bottom: 40px;
      }

      .sun-row { text-align: center; }

      .sun-row-label {
        font-size: 11px;
        color: #fffef0;
        opacity: 0.4;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 4px;
      }

      .sun-row-value {
        font-size: 28px;
        color: #fffef0;
        opacity: 0.9;
      }

      .sun-golden {
        font-style: italic;
        font-size: 13px;
        color: #fffef0;
        opacity: 0.4;
      }

      /* Atmospheric light scatter */
      .sun-atmos {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      /* --- Earth tab --- */
      #view-nature {
        flex-direction: column;
        padding: 40px 20px 100px;
        background: linear-gradient(to bottom, #050f08, #0a1f10);
      }

      .wheel-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0 auto 32px;
      }

      @media (min-width: 600px) {
        .wheel-container { width: 340px; height: 340px; }
      }

      .wheel-img {
        width: 100%;
        height: 100%;
        mix-blend-mode: lighten;
        opacity: 0.9;
        pointer-events: none;
      }

      .wheel-dot {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fffef0;
        box-shadow: 0 0 8px 3px rgba(255, 254, 240, 0.6);
        transform: translate(-50%, -50%);
        animation: wheel-pulse 2s ease-in-out infinite;
      }

      @keyframes wheel-pulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-50%, -50%) scale(1.2); }
      }

      .wheel-tap-zone {
        position: absolute;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: pointer;
      }

      .wheel-tooltip {
        position: absolute;
        background: rgba(10, 10, 31, 0.92);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border-radius: 12px;
        padding: 14px 18px;
        max-width: 220px;
        z-index: 20;
        pointer-events: none;
        opacity: 0;
        transition: opacity 200ms ease;
      }

      .wheel-tooltip.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .wheel-tooltip-name {
        font-style: italic;
        font-size: 15px;
        color: #fffef0;
        margin-bottom: 2px;
      }

      .wheel-tooltip-date {
        font-size: 11px;
        color: #fffef0;
        opacity: 0.4;
        margin-bottom: 6px;
      }

      .wheel-tooltip-text {
        font-style: italic;
        font-size: 13px;
        color: #fffef0;
        opacity: 0.7;
        line-height: 1.5;
      }

      .earth-tree {
        font-style: italic;
        font-size: 13px;
        color: #fffef0;
        opacity: 0.6;
        text-align: center;
        margin-bottom: 6px;
      }

      .earth-nature {
        font-size: 12px;
        color: #fffef0;
        opacity: 0.4;
        text-align: center;
        max-width: 280px;
      }

      /* --- Flame tab --- */
      #view-today {
        flex-direction: column;
        padding: 0 40px;
        transition: background 500ms ease, opacity 300ms ease;
      }

      .flame-icon {
        margin-bottom: 40px;
        opacity: 0.7;
      }

      .flame-text {
        font-style: italic;
        font-size: 22px;
        color: #fffef0;
        opacity: 0.9;
        line-height: 1.6;
        max-width: 75%;
        text-align: center;
        margin-bottom: 40px;
      }

      .flame-divider {
        width: 40px;
        height: 1px;
        background: rgba(255, 254, 240, 0.2);
        margin-bottom: 12px;
      }

      .flame-context {
        font-style: italic;
        font-size: 11px;
        color: #fffef0;
        opacity: 0.3;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- ==================== LOCATION OVERLAY ==================== -->
    <div id="location-overlay">
      <p>To read your sky, Vigil needs to know where you are</p>
      <button class="allow-btn" onclick="requestLocation()">
        Allow Location
      </button>
      <button class="skip-btn" onclick="skipLocation()">
        or continue without
      </button>
    </div>

    <!-- ==================== LAYER 2: MILKY WAY ==================== -->
    <canvas id="milkyway-canvas"></canvas>

    <!-- ==================== LAYER 3: STAR CANVAS ==================== -->
    <canvas id="sky-canvas"></canvas>

    <!-- ==================== LAYER 3.5: ATMOSPHERE ==================== -->
    <div id="atmosphere-overlay"></div>

    <!-- ==================== LAYER 4: CONSTELLATION SVG ==================== -->
    <svg id="constellation-layer" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- ==================== LAYER 4.5: CONSTELLATION CORNER LABEL ==================== -->
    <div id="constellation-corner"></div>

    <!-- ==================== LAYER 5: MOON (Three.js) ==================== -->
    <div id="moon-container">
      <canvas id="moon-three-canvas"></canvas>
    </div>
    <div id="moon-tap-target"></div>

    <!-- ==================== INFO DRAWER ==================== -->
    <div id="drawer-backdrop"></div>
    <div id="info-drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-body" id="drawer-content"></div>
    </div>

    <!-- ==================== SETTINGS OVERLAY ==================== -->
    <div class="settings-confirmation" id="settings-confirmation"></div>

    <!-- ==================== TAB VIEWS ==================== -->
    <div class="view" id="view-day">
      <div class="sun-atmos" style="width:400px;height:400px;top:5%;left:60%;background:radial-gradient(circle,rgba(255,154,60,0.06),transparent 70%)"></div>
      <div class="sun-atmos" style="width:500px;height:500px;top:10%;left:10%;background:radial-gradient(circle,rgba(255,217,125,0.05),transparent 70%)"></div>
      <div class="sun-atmos" style="width:350px;height:350px;top:25%;left:40%;background:radial-gradient(circle,rgba(255,154,60,0.04),transparent 70%)"></div>
      <img class="sun-icon" src="sun.png" width="40" height="40" style="opacity:0.8" draggable="false" />
      <div class="sun-date" id="sun-date"></div>
      <div class="sun-rows" id="sun-rows"></div>
      <div class="sun-golden" id="sun-golden"></div>
    </div>

    <div class="view" id="view-nature">
      <div class="wheel-container" id="wheel-container">
        <img src="wheel.png" class="wheel-img" alt="Wheel of the Year" draggable="false" />
        <div class="wheel-dot" id="wheel-dot"></div>
        <div class="wheel-tooltip" id="wheel-tooltip">
          <div class="wheel-tooltip-name" id="tooltip-name"></div>
          <div class="wheel-tooltip-date" id="tooltip-date"></div>
          <div class="wheel-tooltip-text" id="tooltip-text"></div>
        </div>
      </div>
      <div class="earth-tree" id="earth-tree"></div>
      <div class="earth-nature" id="earth-nature"></div>
    </div>

    <div class="view" id="view-today">
      <div class="flame-icon" id="flame-icon"></div>
      <div class="flame-text" id="flame-text"></div>
      <div class="flame-divider"></div>
      <div class="flame-context" id="flame-context"></div>
    </div>

    <div class="view" id="view-settings">
      <div class="settings-inner">
        <div class="settings-header">vigil</div>
        <div class="settings-section">
          <div class="settings-label">sound</div>

      function getStoredLocation() {
        const lat = localStorage.getItem("vigil_lat");
        const lon = localStorage.getItem("vigil_lon");
        if (lat && lon) return { lat: parseFloat(lat), lon: parseFloat(lon) };
        return null;

      function toJD(date) {
        const y = date.getUTCFullYear();
        const m = date.getUTCMonth() + 1;
        const d =
          date.getUTCDate() +
          date.getUTCHours() / 24 +
          date.getUTCMinutes() / 1440 +
          date.getUTCSeconds() / 86400;
        let yr = y,
          mo = m;
        if (mo <= 2) {
          yr -= 1;
          mo += 12;
        }
        const A = Math.floor(yr / 100);
        const B = 2 - A + Math.floor(A / 4);
        return (
          Math.floor(365.25 * (yr + 4716)) +
          Math.floor(30.6001 * (mo + 1)) +
          d +
          B -
          1524.5
        );
      }

      function toJ2000(jd) {
        return (jd - 2451545.0) / 36525.0;
      }
      function norm360(a) {
        a = a % 360;
        return a < 0 ? a + 360 : a;
      }

      function gmst(jd) {
        const T = toJ2000(jd);
        let st =
          280.46061837 +
          360.98564736629 * (jd - 2451545.0) +
          0.000387933 * T * T -
          (T * T * T) / 38710000.0;
        return norm360(st);
      }

      function lst(jd, lonDeg) {
        return norm360(gmst(jd) + lonDeg);
      }

      function raDecToAltAz(raHours, decDeg, lstDeg, latDeg) {
        const ha = (lstDeg - raHours * 15) * DEG;
        const dec = decDeg * DEG;
        const lat = latDeg * DEG;
        const sinAlt =
          Math.sin(dec) * Math.sin(lat) +
          Math.cos(dec) * Math.cos(lat) * Math.cos(ha);
        const alt = Math.asin(clamp(sinAlt, -1, 1));
        const cosAz =
          (Math.sin(dec) - Math.sin(alt) * Math.sin(lat)) /
          (Math.cos(alt) * Math.cos(lat));
        let az = Math.acos(clamp(cosAz, -1, 1));
        if (Math.sin(ha) > 0) az = 2 * Math.PI - az;
        return { alt: alt * RAD, az: az * RAD };
      }

      function altAzToScreen(alt, az, w, h) {
        if (alt < -2) return null;
        // Stereographic projection — r=0 at zenith, r=1 at horizon
        const r = Math.cos(alt * DEG) / (1 + Math.sin(alt * DEG));
        // Scale so horizon (r=1) sits near the screen corners,
        // giving us a ~140-150 degree field of view — most of the visible dome
        const scale = Math.max(w, h) * 0.55;
        const x = w / 2 + r * Math.sin(az * DEG) * scale;
        const y = h / 2 - r * Math.cos(az * DEG) * scale;
        return { x, y };
      }

        function rand() {
          seed = (seed * 16807 + 0) % 2147483647;
          return seed / 2147483647;

        const fills = [];
        for (let i = 0; i < 900; i++) {
          const ra = rand() * 24; // 0-24 hours
          const dec = Math.asin(2 * rand() - 1) * RAD; // uniform on sphere
          const mag = 3.5 + rand() * 2.5; // mag 3.5 to 6.0
          const bv = -0.2 + rand() * 1.6; // range of colours
          fills.push(["fill_" + i, ra, dec, mag, bv]);

        return fills;

      function findBestConstellation(lat, lon) {
        const now = new Date();
        const jd = toJD(now);
        const lstDeg = lst(jd, lon);
        const month = now.getMonth() + 1; // 1-12

        let best = null;
        let bestScore = -Infinity;

        for (const c of CONSTELLATION_CATALOGUE) {
          const { alt } = raDecToAltAz(c.ra, c.dec, lstDeg, lat);
          if (alt < 5) continue; // below or too near horizon

          // Score: altitude is primary, bonus for being in best months
          let score = alt;
          if (c.bestMonths.includes(month)) score += 15;

          if (score > bestScore) {
            bestScore = score;
            best = c;
          }
        }
        return best;
      }

      /* ==================== MOON PHASE CALCULATION (Meeus) ==================== */

      function calcMoonPhase(date) {
        const jd = toJD(date);
        const T = toJ2000(jd);
        const SYNODIC = 29.53058868;
        const daysSinceNew = jd - 2451550.1;
        const lunations = daysSinceNew / SYNODIC;
        const age = (lunations - Math.floor(lunations)) * SYNODIC;
        const moonElongation = norm360(297.8502 + 445267.1115 * T) * DEG;
        const illumination = ((1 - Math.cos(moonElongation)) / 2) * 100;

        let phaseName;
        if (age < 1.85) phaseName = "New Moon";
        else if (age < 7.38) phaseName = "Waxing Crescent";
        else if (age < 9.23) phaseName = "First Quarter";
        else if (age < 14.77) phaseName = "Waxing Gibbous";
        else if (age < 16.61) phaseName = "Full Moon";
        else if (age < 22.15) phaseName = "Waning Gibbous";
        else if (age < 23.99) phaseName = "Last Quarter";
        else if (age < 27.68) phaseName = "Waning Crescent";
        else phaseName = "New Moon";

        const phase = age / SYNODIC;
        let daysToFull = 14.77 - age;
        if (daysToFull < 0) daysToFull += SYNODIC;
        let daysToNew = SYNODIC - age;
        if (daysToNew < 0.5) daysToNew = 0;

        return {
          phase: Math.round(phase * 1000) / 1000,
          phaseName,
          illumination: Math.round(illumination * 10) / 10,
          ageDays: Math.round(age * 10) / 10,
          daysToFull: Math.round(daysToFull * 10) / 10,
          daysToNew: Math.round(daysToNew * 10) / 10,
        };
      }

      /* ==================== SOLAR CALCULATIONS (NOAA) ==================== */

      function calcSolar(date, lat, lon) {
        const year = date.getFullYear();
        const month = date.getMonth();
        const day = date.getDate();
        const jd = toJD(new Date(Date.UTC(year, month, day, 12, 0, 0)));
        const T = toJ2000(jd);

        const M = norm360(357.52911 + 35999.05029 * T - 0.0001537 * T * T);
        const C =
          (1.9146 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M * DEG) +
          (0.019993 - 0.000101 * T) * Math.sin(2 * M * DEG) +
          0.00029 * Math.sin(3 * M * DEG);
        const L0 = norm360(280.46646 + 36000.76983 * T + 0.0003032 * T * T);
        const sunLon = norm360(L0 + C);
        const omega = 125.04 - 1934.136 * T;
        const lambda = sunLon - 0.00569 - 0.00478 * Math.sin(omega * DEG);
        const eps0 = 23.4393 - 0.013 * T;
        const eps = eps0 + 0.00256 * Math.cos(omega * DEG);
        const sinDec = Math.sin(eps * DEG) * Math.sin(lambda * DEG);
        const decl = Math.asin(sinDec) * RAD;
        const y2 = Math.tan((eps * DEG) / 2) ** 2;
        const eqTime =
          4 *
          RAD *
          (y2 * Math.sin(2 * L0 * DEG) -
            2 * 0.01671 * Math.sin(M * DEG) +
            4 * 0.01671 * y2 * Math.sin(M * DEG) * Math.cos(2 * L0 * DEG) -
            0.5 * y2 * y2 * Math.sin(4 * L0 * DEG) -
            1.25 * 0.01671 * 0.01671 * Math.sin(2 * M * DEG));

        const zenith = 90.833;
        const cosHA =
          Math.cos(zenith * DEG) /
            (Math.cos(lat * DEG) * Math.cos(decl * DEG)) -
          Math.tan(lat * DEG) * Math.tan(decl * DEG);

        if (cosHA > 1)
          return {
            sunrise: null,
            sunset: null,
            solarNoon: null,
            dayLength: 0,
            dayLengthDelta: 0,
          };
        if (cosHA < -1)
          return {
            sunrise: null,
            sunset: null,
            solarNoon: null,
            dayLength: "24h 0m",
            dayLengthDelta: 0,
          };

        const HA = Math.acos(clamp(cosHA, -1, 1)) * RAD;
        const noonUTC = 720 - 4 * lon - eqTime;
        const sunriseUTC = noonUTC - HA * 4;
        const sunsetUTC = noonUTC + HA * 4;
        const tzOffset = -date.getTimezoneOffset();

        function minutesToDate(mins) {
          const d = new Date(year, month, day);
          d.setMinutes(mins + tzOffset);
          return d;
        }

        const sunrise = minutesToDate(sunriseUTC);
        const sunset = minutesToDate(sunsetUTC);
        const solarNoon = minutesToDate(noonUTC);
        const dayLengthMin = 2 * HA * 4;

        // Yesterday's day length for delta
        const jdY = toJD(new Date(Date.UTC(year, month, day - 1, 12, 0, 0)));
        const TY = toJ2000(jdY);
        const MY = norm360(357.52911 + 35999.05029 * TY - 0.0001537 * TY * TY);
        const CY =
          (1.9146 - 0.004817 * TY) * Math.sin(MY * DEG) +
          0.019993 * Math.sin(2 * MY * DEG);
        const L0Y = norm360(280.46646 + 36000.76983 * TY);
        const sunLonY = norm360(L0Y + CY);
        const omegaY = 125.04 - 1934.136 * TY;
        const lambdaY = sunLonY - 0.00569 - 0.00478 * Math.sin(omegaY * DEG);
        const epsY = 23.4393 - 0.013 * TY + 0.00256 * Math.cos(omegaY * DEG);
        const declY =
          Math.asin(Math.sin(epsY * DEG) * Math.sin(lambdaY * DEG)) * RAD;
        const cosHAY =
          Math.cos(90.833 * DEG) /
            (Math.cos(lat * DEG) * Math.cos(declY * DEG)) -
          Math.tan(lat * DEG) * Math.tan(declY * DEG);
        let dayLengthYesterday = 0;
        if (cosHAY >= -1 && cosHAY <= 1)
          dayLengthYesterday = 2 * Math.acos(clamp(cosHAY, -1, 1)) * RAD * 4;
        const dayLengthDelta = Math.round(dayLengthMin - dayLengthYesterday);

        const hours = Math.floor(dayLengthMin / 60);
        const mins = Math.round(dayLengthMin % 60);

        return {
          sunrise,
          sunset,
          solarNoon,
          dayLength: `${hours}h ${mins}m`,
          dayLengthMinutes: Math.round(dayLengthMin),
          dayLengthDelta,
        };
      }

      function isDaytime() {
        if (
          window.VIGIL &&
          window.VIGIL.sun &&
          window.VIGIL.sun.sunrise &&
          window.VIGIL.sun.sunset
        ) {
          const now = new Date();
          return (
            now >= window.VIGIL.sun.sunrise && now <= window.VIGIL.sun.sunset
          );
        }
        const hour = new Date().getHours();
        return hour >= 6 && hour < 20;
      }

      /* ==================== SABBAT CALENDAR ==================== */

      function calcSabbats(year) {
        function equinoxSolstice(y, event) {

          switch (event) {

              break;
            case "summer":
              jde =
                2451716.56767 +
                365241.62603 * Y +
                0.00325 * Y * Y +
                0.00888 * Y * Y * Y -
                0.0003 * Y * Y * Y * Y;
              break;
            case "autumn":
              jde =
                2451810.21715 +
                365242.01767 * Y -
                0.11575 * Y * Y +
                0.00337 * Y * Y * Y +
                0.00078 * Y * Y * Y * Y;
              break;
            case "winter":
              jde =
                2451900.05952 +
                365242.74049 * Y -
                0.06223 * Y * Y -
                0.00823 * Y * Y * Y +
                0.00032 * Y * Y * Y * Y;
              break;
          }
          const epoch = new Date(Date.UTC(2000, 0, 1, 12, 0, 0));
          return new Date(epoch.getTime() + (jde - 2451545.0) * 86400000);
        }

        const springEq = equinoxSolstice(year, "spring");
        const summerSol = equinoxSolstice(year, "summer");
        const autumnEq = equinoxSolstice(year, "autumn");
        const winterSol = equinoxSolstice(year, "winter");
        const prevWinterSol = equinoxSolstice(year - 1, "winter");

        const sabbats = [
          { name: "Yule", date: winterSol },
          { name: "Imbolc", date: new Date(year, 1, 1) },
          { name: "Ostara", date: springEq },
          { name: "Beltane", date: new Date(year, 4, 1) },
          { name: "Litha", date: summerSol },
          { name: "Lughnasadh", date: new Date(year, 7, 1) },
          { name: "Mabon", date: autumnEq },
          { name: "Samhain", date: new Date(year, 9, 31) },
        ];
        sabbats.sort((a, b) => a.date - b.date);

        const now = new Date();
        const todayMs = now.getTime();
        const oneDay = 86400000;
        let nextSabbat = null,
          daysUntilNext = Infinity,
          nearSabbat = null;

        for (const s of sabbats) {
          const diff = Math.ceil((s.date.getTime() - todayMs) / oneDay);
          if (diff >= 0 && diff < daysUntilNext) {
            daysUntilNext = diff;
            nextSabbat = s;
          }
          if (Math.abs(diff) <= 3) nearSabbat = s.name;
        }
        if (!nextSabbat) {
          nextSabbat = { name: "Imbolc", date: new Date(year + 1, 1, 1) };
          daysUntilNext = Math.ceil(
            (nextSabbat.date.getTime() - todayMs) / oneDay,
          );
        }

        const yuleThis = winterSol,
          yulePrev = prevWinterSol;
        let wheelPosition;
        if (todayMs >= yuleThis.getTime()) {
          const yuleNext = equinoxSolstice(year + 1, "winter");
          wheelPosition =
            (todayMs - yuleThis.getTime()) /
            (yuleNext.getTime() - yuleThis.getTime());
        } else {
          wheelPosition =
            (todayMs - yulePrev.getTime()) /
            (yuleThis.getTime() - yulePrev.getTime());
        }

        let currentSabbat = sabbats[sabbats.length - 1].name;
        for (let i = sabbats.length - 1; i >= 0; i--) {
          if (todayMs >= sabbats[i].date.getTime()) {
            currentSabbat = sabbats[i].name;
            break;
          }
        }

        return {
          current: currentSabbat,
          next: nextSabbat.date,
          nextName: nextSabbat.name,
          daysUntilNext,
          nearSabbat,
          wheelOfYear: Math.round(wheelPosition * 1000) / 1000,
          all: sabbats,
        };
      }

      /* ==================== WEATHER (Open-Meteo) ==================== */

      async function fetchWeather(lat, lon) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,cloudcover&daily=sunrise,sunset&timezone=auto`;
        try {
          const res = await fetch(url);
          const data = await res.json();
          const c = data.current;
          const windDir = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"][
            Math.round(c.winddirection_10m / 45) % 8
          ];
          const cloud = c.cloudcover;
          let description, stargazeQuality;
          const code = c.weathercode;
          if (code === 0) description = "clear";
          else if (code <= 3) description = "partly cloudy";
          else if (code <= 49) description = "foggy";
          else if (code <= 69) description = "rainy";
          else if (code <= 79) description = "snowy";
          else if (code <= 84) description = "rainy";
          else if (code <= 89) description = "snowy";
          else if (code <= 99) description = "stormy";
          else description = "overcast";
          if (cloud < 20) stargazeQuality = "excellent";
          else if (cloud < 40) stargazeQuality = "good";
          else if (cloud < 70) stargazeQuality = "fair";
          else stargazeQuality = "poor";
          return {
            cloudCover: cloud,
            windSpeed: c.windspeed_10m,
            windDirection: windDir,
            weatherCode: code,
            description,
            temperature: c.temperature_2m,
            stargazeQuality,
          };
        } catch (e) {
          console.warn("Weather fetch failed:", e);
          return {
            cloudCover: null,
            windSpeed: null,
            windDirection: null,
            weatherCode: null,
            description: "unavailable",
            temperature: null,
            stargazeQuality: "unknown",
          };
        }
      }

      function playAudioNow() {
        // Must be called synchronously inside a user gesture — no awaits before this
        if (audioStarted) return;
        audioStarted = true;
        ambientAudio.volume = 0;
        ambientAudio.play().catch(() => { audioStarted = false; });
        // Fade in over 3 seconds
        const target = audioVolume > 0 ? audioVolume : 0.25;
        const steps = 60;
        const interval = 3000 / steps;
        let step = 0;
        const fade = setInterval(() => {
          step++;
          ambientAudio.volume = Math.min(target, target * (step / steps));
          if (step >= steps) clearInterval(fade);
        }, interval);
      }

      function requestLocation() {
        // 1. Play audio FIRST — synchronously within the gesture
        playAudioNow();
        requestMotionPermission();
        // 2. THEN do async geolocation
        if (!navigator.geolocation) {
          skipLocation(true);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            userLocation = {
              lat: pos.coords.latitude,
              lon: pos.coords.longitude,
            };
            storeLocation(userLocation.lat, userLocation.lon);
            dismissOverlay();
          },
          () => skipLocation(true),
          { timeout: 10000 },
        );
      }

      function skipLocation(audioAlreadyStarted) {
        if (!audioAlreadyStarted) {
          playAudioNow();
          requestMotionPermission();
        }
        userLocation = DEFAULT_LOCATION;
        storeLocation(userLocation.lat, userLocation.lon);
        dismissOverlay();

      function formatTime(d) {

      function updateDayBackground() {
        const el = document.getElementById('view-day');
        const V = window.VIGIL;
        if (!V || !V.sun) { el.style.background = 'linear-gradient(to bottom, #0a1628, #0d2545)'; return; }
        const now = new Date();
        const sr = V.sun.sunrise;
        const ss = V.sun.sunset;
        if (!sr || !ss) { el.style.background = 'linear-gradient(to bottom, #1a0a3d, #0d1b4b)'; return; }
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const srMin = sr.getHours() * 60 + sr.getMinutes();
        const ssMin = ss.getHours() * 60 + ss.getMinutes();
        if (nowMin < srMin - 60 || nowMin > ssMin + 60) {
          el.style.background = 'linear-gradient(to bottom, #1a0a3d, #0d1b4b)';
        } else if (nowMin < srMin + 60 || nowMin > ssMin - 60) {
          el.style.background = 'linear-gradient(to bottom, #2d1a00, #5c2d0a, #1a0a2e)';
        } else {
          el.style.background = 'linear-gradient(to bottom, #0a1628, #0d2545)';
        }
      }

        const size = container.offsetWidth;
        const cx = size / 2, cy = size / 2;

        const posAngleRad = (wheelPos * 360 - 90) * Math.PI / 180;
        const dot = document.getElementById('wheel-dot');
        dot.style.left = (cx + Math.cos(posAngleRad) * dotRadius) + 'px';
        dot.style.top = (cy + Math.sin(posAngleRad) * dotRadius) + 'px';

        const existing = container.querySelectorAll('.wheel-tap-zone');
        existing.forEach(el => el.remove());

        WHEEL_POINTS.forEach((s, i) => {
          const a = (s.angle - 90) * Math.PI / 180;
          const zx = cx + Math.cos(a) * dotRadius;
          const zy = cy + Math.sin(a) * dotRadius;
          const zone = document.createElement('div');
          zone.className = 'wheel-tap-zone';
          zone.style.left = zx + 'px';
          zone.style.top = zy + 'px';

      /* --- Moon phase SVG icon --- */
      function moonPhaseSVG(phase) {
        // phase: 0 = new, 0.25 = first quarter, 0.5 = full, 0.75 = last quarter
        const size = 60;
        const r = 26;
        const cx = size / 2,
          cy = size / 2;

        let svg = `<svg class="drawer-phase-icon" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#111828" stroke="rgba(255,254,240,0.15)" stroke-width="1"/>`;

        if (phase < 0.01 || phase > 0.99) {
          // New moon — just the dark circle
        } else if (Math.abs(phase - 0.5) < 0.01) {
          // Full moon
          svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#fffef0" opacity="0.9"/>`;
        } else {
          // Draw illuminated portion
          const lit = phase < 0.5;
          const t = lit ? phase * 2 : (phase - 0.5) * 2;
          // t goes 0→1 within each half
          const k = lit ? 1 - 2 * t : 2 * t - 1;
          const sweepR = Math.abs(k) * r;
          const bulge = k > 0; // true = crescent, false = gibbous

          // Arc from top to bottom on the lit side
          const litSide = lit ? "right" : "left";
          const startY = cy - r;
          const endY = cy + r;

          // Terminator is an elliptical arc
          const terminatorX = cx;
          const arcSweep = bulge ? 0 : 1;

          if (litSide === "right") {
            svg += `<path d="M ${cx} ${startY} A ${r} ${r} 0 0 1 ${cx} ${endY} A ${sweepR} ${r} 0 0 ${arcSweep} ${cx} ${startY}" fill="#fffef0" opacity="0.9"/>`;
          } else {
            svg += `<path d="M ${cx} ${startY} A ${r} ${r} 0 0 0 ${cx} ${endY} A ${sweepR} ${r} 0 0 ${1 - arcSweep} ${cx} ${startY}" fill="#fffef0" opacity="0.9"/>`;
          }
        }

        svg += "</svg>";
        return svg;
      }

      /* ==================== STAR RENDERING (Canvas 2D — sprite-based) ==================== */

      function bvToColor(bv) {
        // More gradual colour mapping for realistic tints
        if (bv < -0.2) return { r: 155, g: 176, b: 255 }; // hot blue
        if (bv < -0.1) return { r: 180, g: 200, b: 255 }; // blue-white
        if (bv < 0.15) return { r: 220, g: 230, b: 255 }; // white
        if (bv < 0.4) return { r: 255, g: 250, b: 240 }; // warm white
        if (bv < 0.8) return { r: 255, g: 244, b: 222 }; // yellow-white
        if (bv < 1.2) return { r: 255, g: 226, b: 170 }; // yellow-orange
        if (bv < 1.6) return { r: 255, g: 200, b: 130 }; // orange
        return { r: 255, g: 180, b: 100 }; // deep orange-red
      }

      function getStarSprite(mag, color, isHero) {
        // Faint stars use warm white — no colour tint
        const c = mag >= 4 ? { r: 255, g: 254, b: 240 } : color;
        const magBucket = isHero
          ? -2
          : mag < 1
            ? -1
            : mag < 2.5
              ? 0
              : mag < 4
                ? 1
                : 2;
        const key = `${magBucket}_${c.r}_${c.g}_${c.b}`;
        if (starSpriteCache.has(key)) return starSpriteCache.get(key);

        const sprite = buildStarSprite(mag, c, isHero);
        starSpriteCache.set(key, sprite);
        return sprite;
      }

      function buildStarSprite(mag, color, isHero) {
        const { r, g, b } = color;
        const S = 2; // 2x for retina crispness
        let coreR, spriteHalf;

        if (isHero) {
          coreR = 0.98;
          spriteHalf = 5.9;
        } else if (mag < 1) {
          coreR = 0.84;
          spriteHalf = 5.0;
        } else if (mag < 2.5) {
          coreR = 0.63;
          spriteHalf = 3.8;
        } else if (mag < 4) {
          coreR = 0.56;
          spriteHalf = 2.45;
        } else {
          coreR = 0.35;
          spriteHalf = 1.4;
        }

        // Bloom radius = multiple of core
        const bloomR = isHero
          ? coreR * 4
          : mag < 1
            ? coreR * 4
            : mag < 2.5
              ? coreR * 3
              : mag < 4
                ? coreR * 2.5
                : coreR * 1.5;

        const sz = spriteHalf * 2 * S;
        const cvs = document.createElement("canvas");
        cvs.width = sz;
        cvs.height = sz;
        const ctx = cvs.getContext("2d");
        const cx = sz / 2,
          cy = sz / 2;

        // --- Hero: outer halo ---
        if (isHero) {
          const haloR = 5.4 * S;
          const haloGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, haloR);
          haloGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.06)`);
          haloGrad.addColorStop(0.35, `rgba(${r}, ${g}, ${b}, 0.025)`);
          haloGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
          ctx.fillStyle = haloGrad;
          ctx.beginPath();
          ctx.arc(cx, cy, haloR, 0, Math.PI * 2);
          ctx.fill();
        }

        // --- Bloom: soft radial gradient starting at edge of core ---
        const br = bloomR * S;
        const cr = coreR * S;
        const bloomGrad = ctx.createRadialGradient(
          cx,
          cy,
          cr * 0.8,
          cx,
          cy,
          br,
        );
        bloomGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.5)`);
        bloomGrad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, 0.15)`);
        bloomGrad.addColorStop(0.7, `rgba(${r}, ${g}, ${b}, 0.04)`);
        bloomGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = bloomGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, br, 0, Math.PI * 2);
        ctx.fill();

        // --- Core: fully opaque bright centre ---
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.fill();

        return { canvas: cvs, halfSize: spriteHalf };
      }

      function magToOpacity(mag) {
        // Stars are faint because they're tiny, not transparent
        if (mag < 4) return 1.0;
        if (mag < 5) return 0.9;
        if (mag < 5.5) return 0.82;
        return 0.75;
      }

      function computeStarPositions() {
        const now = new Date();
        const jd = toJD(now);
        const lstDeg = lst(jd, userLocation.lon);
        const dpr = Math.min(window.devicePixelRatio, 2);
        const w = skyCanvas.width / dpr;
        const h = skyCanvas.height / dpr;

        starScreenPositions = [];

        const allStars = STAR_CATALOGUE.concat(FILL_STARS);

        for (const star of allStars) {
          const [name, ra, dec, mag, bv] = star;
          const { alt, az } = raDecToAltAz(ra, dec, lstDeg, userLocation.lat);
          if (alt < -2) continue;

          const pos = altAzToScreen(alt, az, w, h);
          if (!pos) continue;
          if (pos.x < -50 || pos.x > w + 50 || pos.y < -50 || pos.y > h + 50)
            continue;

          const color = bvToColor(bv);
          const isHero = HERO_STARS.has(name);

          starScreenPositions.push({
            x: pos.x,
            y: pos.y,
            mag,
            bv,
            name,
            color,
            opacity: magToOpacity(mag),
            isConstellationStar: constellationStarNames.has(name),
            isTwinkle: TWINKLE_STARS.has(name),
            isHero,
            sprite: getStarSprite(mag, color, isHero),
            // Atmospheric scintillation: multiple fast random phases
            twinklePhase1: Math.random() * 1000,
            twinklePhase2: Math.random() * 1000,
            twinkleSpeed1: 150 + Math.random() * 250, // 150-400ms period (used as ms divisor)
            twinkleSpeed2: 200 + Math.random() * 300,
          });
        }

        // Deep background stars — simple screen positions only
        deepStarPositions = [];
        for (const star of DEEP_STARS) {
          const [name, ra, dec, mag] = star;
          const { alt, az } = raDecToAltAz(ra, dec, lstDeg, userLocation.lat);
          if (alt < -2) continue;
          const pos = altAzToScreen(alt, az, w, h);
          if (!pos) continue;
          if (pos.x < -10 || pos.x > w + 10 || pos.y < -10 || pos.y > h + 10)
            continue;
          deepStarPositions.push({
            x: pos.x,
            y: pos.y,
            opacity: 0.2 + (6.5 - mag) * 0.1, // 0.2 for mag 6.5, 0.35 for mag 5.0
            size: 0.4 + (6.5 - mag) * 0.13, // 0.4px for mag 6.5, 0.6px for mag 5.0
          });
        }
      }

      function drawStars(time) {
        const dpr = Math.min(window.devicePixelRatio, 2);
        const w = skyCanvas.width / dpr;
        const h = skyCanvas.height / dpr;

        skyCtx.save();
        skyCtx.setTransform(1, 0, 0, 1, 0, 0);
        skyCtx.clearRect(0, 0, skyCanvas.width, skyCanvas.height);
        skyCtx.scale(dpr, dpr);

        // Deep background stars — tiny warm-white dots, no bloom
        skyCtx.fillStyle = "rgba(255, 254, 240, 1)";
        for (const ds of deepStarPositions) {
          skyCtx.globalAlpha = ds.opacity;
          skyCtx.beginPath();
          skyCtx.arc(
            ds.x + parallaxX,
            ds.y - parallaxY,
            ds.size,
            0,
            Math.PI * 2,
          );
          skyCtx.fill();
        }

        const maxNear = isMobile ? 30 : 8;
        const maxMid = isMobile ? 16 : 4;
        const maxFar = isMobile ? 8 : 2;

        for (const star of starScreenPositions) {
          let pxOffset;
          if (star.mag < 1.5) pxOffset = maxNear;
          else if (star.mag < 3.0) pxOffset = maxMid;
          else pxOffset = maxFar;

          const sx = star.x + parallaxX * pxOffset;
          const sy = star.y - parallaxY * pxOffset;

          let opacity = star.opacity;

          // Constellation stars: slightly brighter
          if (star.isConstellationStar) {
            opacity = Math.min(1.0, opacity * 1.3);
          }

          // Atmospheric scintillation — non-hero stars only, nearly imperceptible
          if (star.isTwinkle && !star.isHero) {
            const t = performance.now();
            const wave1 = Math.sin(t / star.twinkleSpeed1 + star.twinklePhase1);
            const wave2 = Math.sin(t / star.twinkleSpeed2 + star.twinklePhase2);
            const opacityMod = 1.0 + 0.015 * wave1 + 0.008 * wave2;
            opacity = clamp(opacity * opacityMod, opacity * 0.97, opacity * 1.03);
          }

          const { canvas: spriteCanvas, halfSize } = star.sprite;
          skyCtx.globalAlpha = opacity;
          skyCtx.drawImage(spriteCanvas, sx - halfSize, sy - halfSize, halfSize * 2, halfSize * 2);
        }

        skyCtx.globalAlpha = 1.0;
        skyCtx.restore();
      }

      /* ==================== CONSTELLATION RENDERER ==================== */

      function selectConstellations() {
        // Use real-time visibility calculation
        bestConstellationEntry = findBestConstellation(userLocation.lat, userLocation.lon);

        // Still populate activeConstellationKeys for the SVG line drawing
        constellationStarNames.clear();
        activeConstellationKeys = [];
        if (bestConstellationEntry) {
          const key = bestConstellationEntry.key;
          if (CONSTELLATIONS[key]) {
            activeConstellationKeys = [key];
            for (const s of CONSTELLATIONS[key].stars) {
              constellationStarNames.add(s.n);
            }
          }
        }
        return activeConstellationKeys;
      }

      function drawConstellations() {
        const svg = document.getElementById("constellation-layer");
        const now = new Date();
        const jd = toJD(now);
        const lstDeg = lst(jd, userLocation.lon);
        const w = window.innerWidth;
        const h = window.innerHeight;
        let svgContent = "";

        // Try each constellation in order until we find one with visible stars
        let primaryKey = null;
        let constellation = null;
        let screenStars = [];
        let visibleCount = 0;

        for (const key of activeConstellationKeys) {
          const c = CONSTELLATIONS[key];
          if (!c) continue;
          const positions = [];
          let vis = 0;
          for (const s of c.stars) {
            const { alt, az } = raDecToAltAz(
              s.ra,
              s.dec,
              lstDeg,
              userLocation.lat,
            );
            const pos = altAzToScreen(alt, az, w, h);
            positions.push(pos);
            if (pos) vis++;
          }
          if (vis >= 2) {
            primaryKey = key;
            constellation = c;
            screenStars = positions;
            visibleCount = vis;
            break;
          }
        }

        if (!primaryKey || !constellation) {
          svg.innerHTML = "";
          return null;
        }

        // Lines
        for (const [a, b] of constellation.lines) {
          const pa = screenStars[a];
          const pb = screenStars[b];
          if (!pa || !pb) continue;
          svgContent += `<line class="constellation-line" x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" />`;
        }

        // Star dots with glow filter
        svgContent += `<defs><filter id="cg"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
        let sumX = 0,
          sumY = 0,
          count = 0;
        constellation.stars.forEach((s, i) => {
          const pos = screenStars[i];
          if (!pos) return;
          svgContent += `<circle class="constellation-star" cx="${pos.x}" cy="${pos.y}" r="2.5" filter="url(#cg)" opacity="0.8" />`;
          sumX += pos.x;
          sumY += pos.y;
          count++;
        });

        svg.innerHTML = svgContent;

        // Update fixed corner label

        return primaryKey;
      }

      function updateConstellationParallax() {
        const svg = document.getElementById("constellation-layer");
        if (!svg) return;
        const maxOffset = isMobile ? 16 : 4;
        svg.style.transform = `translate(${parallaxX * maxOffset}px, ${-parallaxY * maxOffset}px)`;
      }

      /* ==================== MOON — THREE.JS PHOTOREALISTIC ==================== */

      function initMoonThreeJS(phase, illumination) {
        moonPhaseValue = phase;
        moonIllumination = illumination;

        const container = document.getElementById("moon-container");
        const moonSize = window.innerWidth <= 600 ? 180 : 220;
        const canvasSize = moonSize + 120; // room for glow

        const canvas = document.getElementById("moon-three-canvas");
        canvas.style.width = canvasSize + "px";
        canvas.style.height = canvasSize + "px";

        // Scene
        moonScene = new THREE.Scene();

        // Camera: orthographic for consistent sizing
        const aspect = 1;
        const frustum = 1.8;
        moonCamera = new THREE.OrthographicCamera(
          -frustum,
          frustum,
          frustum,
          -frustum,
          0.1,
          100,
        );
        moonCamera.position.z = 5;

        // Renderer
        moonRenderer = new THREE.WebGLRenderer({
          canvas: canvas,
          antialias: true,
          alpha: true,
        });
        const dpr = Math.min(window.devicePixelRatio, 2);
        moonRenderer.setPixelRatio(dpr);
        moonRenderer.setSize(canvasSize, canvasSize);

        // Moon sphere
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const textureLoader = new THREE.TextureLoader();

        // Fallback material in case textures fail
        const fallbackMaterial = new THREE.MeshStandardMaterial({
          color: 0x1a1a2e,
          roughness: 0.9,
          metalness: 0,
        });

        const material = new THREE.MeshStandardMaterial({
          roughness: 0.9,
          metalness: 0,
          bumpScale: 0.04,
        });

        // Load textures with error handling
        textureLoader.load("moon_color.jpg",
          (tex) => { material.map = tex; material.needsUpdate = true; if (moonRenderer) moonRenderer.render(moonScene, moonCamera); },
          undefined,
          () => { console.warn('Moon color texture failed to load'); material.color = new THREE.Color(0x1a1a2e); material.needsUpdate = true; }
        );
        textureLoader.load("moon_bump.jpg",
          (tex) => { material.bumpMap = tex; material.needsUpdate = true; if (moonRenderer) moonRenderer.render(moonScene, moonCamera); },
          undefined,
          () => { console.warn('Moon bump texture failed to load'); }
        );

        moonSphere = new THREE.Mesh(geometry, material);
        moonScene.add(moonSphere);

        // Directional light (the "sun") — positioned based on phase
        // phase 0 = new (light behind), 0.25 = first quarter (right),
        // 0.5 = full (front), 0.75 = last quarter (left)
        moonLight = new THREE.DirectionalLight(0xffffff, 1.6);
        updateMoonLightPosition(phase);
        moonScene.add(moonLight);

        // Ambient light for earthshine (very dim)
        const ambient = new THREE.AmbientLight(0x334466, 0.05);
        moonScene.add(ambient);

        // Glow sprite behind the moon
        const glowCanvas = document.createElement("canvas");
        glowCanvas.width = 256;
        glowCanvas.height = 256;
        const gCtx = glowCanvas.getContext("2d");
        const glowGrad = gCtx.createRadialGradient(128, 128, 20, 128, 128, 128);
        glowGrad.addColorStop(0, "rgba(255, 254, 240, 0.25)");
        glowGrad.addColorStop(0.3, "rgba(255, 254, 240, 0.10)");
        glowGrad.addColorStop(0.6, "rgba(255, 254, 240, 0.03)");
        glowGrad.addColorStop(1, "rgba(255, 254, 240, 0)");
        gCtx.fillStyle = glowGrad;
        gCtx.fillRect(0, 0, 256, 256);

        const glowTexture = new THREE.CanvasTexture(glowCanvas);
        const glowMaterial = new THREE.SpriteMaterial({
          map: glowTexture,
          transparent: true,
          depthWrite: false,
        });
        moonGlowMesh = new THREE.Sprite(glowMaterial);
        updateMoonGlow(illumination);
        moonGlowMesh.position.z = -0.5; // behind the sphere
        moonScene.add(moonGlowMesh);

        // Initial render
        moonRenderer.render(moonScene, moonCamera);
      }

      function updateMoonLightPosition(phase) {
        if (!moonLight) return;
        // Map phase to light angle on the x-z plane
        const angle = phase * Math.PI * 2;
        moonLight.position.set(Math.sin(angle), 0.1, -Math.cos(angle));
        moonLight.position.normalize().multiplyScalar(5);
      }

      function updateMoonGlow(illumination) {
        if (!moonGlowMesh) return;
        const frac = illumination / 100;
        // Full moon = big diffuse glow (scale 5), crescent = tight glow (scale 2.5)
        const glowScale = 2.5 + frac * 2.5;
        moonGlowMesh.scale.set(glowScale, glowScale, 1);
        moonGlowMesh.material.opacity = 0.1 + frac * 0.1;
      }

      // Extremely slow moon rotation — 27 day period, barely perceptible
      function animateMoon(time) {
        if (!moonSphere || !moonRenderer) return;
        // Real moon rotates once per 27.3 days.
        // At 60fps that's about 0.0000027 radians/frame.
        // Speed it up just enough to be perceptible over a session (~5x real)
        moonSphere.rotation.y = moonRotationOffset + time * 0.00002;
        moonRenderer.render(moonScene, moonCamera);
      }

      /* ==================== PARALLAX INPUT ==================== */

      function setupParallaxInput() {
        isMobile = "ontouchstart" in window || navigator.maxTouchPoints > 0;

        if (window.DeviceOrientationEvent) {
          if (typeof DeviceOrientationEvent.requestPermission === "function") {
            // iOS: if previously granted, just add listener
            if (localStorage.getItem('vigil_motion') === 'granted') {
              window.addEventListener("deviceorientation", onDeviceOrientation);
            }
            // Otherwise, requestMotionPermission() will be called on first tap
          } else {
            // Non-iOS: add gyroscope listener directly
            window.addEventListener("deviceorientation", onDeviceOrientation);
          }
        }
        window.addEventListener("mousemove", onMouseMove);
      }

      // Request iOS gyroscope permission — must be called inside a click handler
      let motionPermissionRequested = false;
      function requestMotionPermission() {
        if (motionPermissionRequested) return;
        if (typeof DeviceOrientationEvent === 'undefined') return;
        if (typeof DeviceOrientationEvent.requestPermission !== "function") return;
        motionPermissionRequested = true;
        DeviceOrientationEvent.requestPermission()
          .then((state) => {
            if (state === "granted") {
              localStorage.setItem('vigil_motion', 'granted');
              window.addEventListener("deviceorientation", onDeviceOrientation);
            }
          })
          .catch(() => { motionPermissionRequested = false; });
      }

      function onDeviceOrientation(e) {
        if (e.gamma === null || e.beta === null) return;
        // gamma = left/right tilt, beta = forward/back tilt
        // ±15° maps to full range for responsive feel
        targetParallaxX = clamp(e.gamma / 15, -1, 1);
        targetParallaxY = clamp((e.beta - 45) / 15, -1, 1);
      }

      function onMouseMove(e) {
        targetParallaxX = (e.clientX / window.innerWidth - 0.5) * 2;
        targetParallaxY = (e.clientY / window.innerHeight - 0.5) * 2;
      }

      // Touch drag fallback — works even without gyroscope permission
      let touchStartX = 0, touchStartY = 0;
      let touchParallaxX = 0, touchParallaxY = 0;
      document.addEventListener('touchstart', (e) => {
        if (e.target.closest('#tab-bar, #info-drawer, #view-settings, #location-overlay')) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchParallaxX = targetParallaxX;
        touchParallaxY = targetParallaxY;
      }, { passive: true });

      document.addEventListener('touchmove', (e) => {
        if (e.target.closest('#tab-bar, #info-drawer, #view-settings, #location-overlay')) return;
        const dx = (e.touches[0].clientX - touchStartX) / window.innerWidth * 4;
        const dy = (e.touches[0].clientY - touchStartY) / window.innerHeight * 4;
        targetParallaxX = clamp(touchParallaxX + dx, -1, 1);
        targetParallaxY = clamp(touchParallaxY - dy, -1, 1);
      }, { passive: true });

      /* ==================== MAIN INIT & ANIMATION LOOP ==================== */

      async function initScene() {
        // --- Setup star canvas ---
        skyCanvas = document.getElementById("sky-canvas");
        skyCtx = skyCanvas.getContext("2d");
        const dpr = Math.min(window.devicePixelRatio, 2);
        skyCanvas.width = window.innerWidth * dpr;
        skyCanvas.height = window.innerHeight * dpr;

        // --- Draw Milky Way (once, static) ---
        drawMilkyWay();

        // --- Compute all data ---
        const now = new Date();
        const moonData = calcMoonPhase(now);
        const sunData = calcSolar(now, userLocation.lat, userLocation.lon);
        const sabbatData = calcSabbats(now.getFullYear());

        // Select constellations
        selectConstellations();
        computeStarPositions();
        const primaryConstellation = drawConstellations();

        // Init Three.js moon with real phase
        initMoonThreeJS(moonData.phase, moonData.illumination);
        setupMoonTapTarget();

        // Setup parallax
        setupParallaxInput();

        // Handle resize
        window.addEventListener("resize", () => {
          const dpr = Math.min(window.devicePixelRatio, 2);
          skyCanvas.width = window.innerWidth * dpr;
          skyCanvas.height = window.innerHeight * dpr;
          drawMilkyWay();
          computeStarPositions();
          drawConstellations();
          setupMoonTapTarget();
          // Resize moon renderer
          if (moonRenderer) {
            const moonSize = window.innerWidth <= 600 ? 180 : 220;
            const canvasSize = moonSize + 120;
            moonRenderer.setSize(canvasSize, canvasSize);
            const canvas = document.getElementById("moon-three-canvas");
            canvas.style.width = canvasSize + "px";
            canvas.style.height = canvasSize + "px";
            moonRenderer.render(moonScene, moonCamera);
          }
        });

        // Animation loop
        function animate() {
          animationId = requestAnimationFrame(animate);
          const time = performance.now() * 0.001;

          // Smooth parallax
          const lerpFactor = isMobile ? 0.08 : 0.05;
          parallaxX += (targetParallaxX - parallaxX) * lerpFactor;
          parallaxY += (targetParallaxY - parallaxY) * lerpFactor;

          drawStars(time);
          updateConstellationParallax();
          animateMoon(time);
        }
        animate();

        // --- Fetch weather ---
        const weatherData = await fetchWeather(
          userLocation.lat,
          userLocation.lon,
        );

        // --- Build VIGIL object ---
        const constellationData = bestConstellationEntry
            ? { primary: bestConstellationEntry.name, key: bestConstellationEntry.key }
            : { primary: null, key: null };

        window.VIGIL = {
          location: {
            lat: userLocation.lat,
            lon: userLocation.lon,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          },
          moon: moonData,
          sun: {
            sunrise: sunData.sunrise,
            sunset: sunData.sunset,
            solarNoon: sunData.solarNoon,
            dayLength: sunData.dayLength,
            dayLengthDelta: sunData.dayLengthDelta,
          },
          sabbat: {
            current: sabbatData.current,
            next: sabbatData.next,
            nextName: sabbatData.nextName,
            daysUntilNext: sabbatData.daysUntilNext,
            nearSabbat: sabbatData.nearSabbat,
          },
          weather: weatherData,
          constellation: constellationData,
          wheelOfYear: sabbatData.wheelOfYear,
        };

        console.log(
          "%c✦ VIGIL ✦",
          "color: #ffd97d; font-size: 16px; font-weight: bold;",
        );
        console.log(
          "%cPagan Nature Almanac — data for " + now.toLocaleDateString(),
          "color: #c8d8ff; font-size: 11px;",
        );
        console.log(window.VIGIL);
      }
    </script>
